<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Quest 3 Three.js AR</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:transparent;
}

canvas{
    display:block;
}
</style>
</head>
<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.179.1/build/three.module.js";
import { ARButton } from "https://unpkg.com/three@0.179.1/examples/jsm/webxr/ARButton.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    70,
    window.innerWidth/window.innerHeight,
    0.01,
    100
);

const renderer = new THREE.WebGLRenderer({
    antialias:true,
    alpha:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);

// Passthrough-AR Button

document.body.appendChild(

ARButton.createButton(renderer,{

    requiredFeatures:[]

})

);

// Licht

scene.add(new THREE.HemisphereLight(0xffffff,0xbbbbff,2));

// Würfel

const cube = new THREE.Mesh(

new THREE.BoxGeometry(0.2,0.2,0.2),

new THREE.MeshStandardMaterial({

color:0x00ff00

})

);

cube.position.set(0,1,-1);

scene.add(cube);

// Animation

renderer.setAnimationLoop(()=>{

    cube.rotation.y+=0.01;

    renderer.render(scene,camera);

});

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
