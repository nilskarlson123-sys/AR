<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Three.js WebXR AR</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#222;
}

#arButton{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#0a84ff;
    color:white;
    cursor:pointer;
    z-index:100;
}

#info{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    font-family:Arial;
    z-index:100;
}
</style>

</head>
<body>

<div id="info">Three.js Viewer</div>
<button id="arButton">AR starten</button>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.179.1/build/three.module.js";
import { GLTFLoader } from "https://unpkg.com/three@0.179.1/examples/jsm/loaders/GLTFLoader.js";
import { OrbitControls } from "https://unpkg.com/three@0.179.1/examples/jsm/controls/OrbitControls.js";
import { ARButton } from "https://unpkg.com/three@0.179.1/examples/jsm/webxr/ARButton.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

const camera = new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
100
);

camera.position.set(0,1.2,3);

const renderer = new THREE.WebGLRenderer({
antialias:true,
alpha:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

// Licht

scene.add(new THREE.HemisphereLight(0xffffff,0xbbbbff,2));

const light = new THREE.DirectionalLight(0xffffff,2);
light.position.set(2,5,3);
scene.add(light);

// Modell laden

const loader = new GLTFLoader();

loader.load(
"model.glb",
(gltf)=>{

    gltf.scene.position.set(0,0,0);

    scene.add(gltf.scene);

},
undefined,
(err)=>{

    console.error(err);

}
);

// Animation

renderer.setAnimationLoop(()=>{

controls.update();

renderer.render(scene,camera);

});

// Resize

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

// ---------- eigener AR Button ----------

document.getElementById("arButton").onclick=()=>{

if(!navigator.xr){

alert("WebXR nicht verfügbar");

return;

}

navigator.xr.isSessionSupported("immersive-ar").then((supported)=>{

if(!supported){

alert("AR wird auf diesem Gerät nicht unterstützt.");

return;

}

// versteckten Three.js Button erzeugen

const btn = ARButton.createButton(renderer,{
requiredFeatures:[]
});

btn.style.display="none";

document.body.appendChild(btn);

btn.click();

});

};

</script>

</body>
</html>
